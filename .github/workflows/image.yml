name: Image

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      git-tag: ${{ steps.git-tag.outputs.git-tag }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - id: git-tag
        run: |
          echo "git-tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  release_image:
    needs: tag

    uses: ./.github/workflows/docker.yml

    with:
      image: |
        ghcr.io/fenril058/textlint-plugin-org:${{ needs.tag.outputs.git-tag }}
        ghcr.io/fenril058/textlint-plugin-org:latest
      target: run
